<!-- ==========================================
     SOLID COLOR BUTTONS
     ========================================== -->

<!-- Primary Button -->
<button class="btn btn-primary">Primary Button</button>

<!-- Success Button -->
<button class="btn btn-success">Success Button</button>

<!-- Danger Button -->
<button class="btn btn-danger">Danger Button</button>

<!-- Warning Button -->
<button class="btn btn-warning">Warning Button</button>

<!-- Info Button -->
<button class="btn btn-info">Info Button</button>

<!-- Secondary Button -->
<button class="btn btn-secondary">Secondary Button</button>

<!-- Dark Button -->
<button class="btn btn-dark">Dark Button</button>

<!-- Light Button -->
<button class="btn btn-light">Light Button</button>


<!-- ==========================================
     OUTLINE BUTTONS
     ========================================== -->

<!-- Outline Primary -->
<button class="btn btn-outline-primary">Outline Primary</button>

<!-- Outline Success -->
<button class="btn btn-outline-success">Outline Success</button>

<!-- Outline Danger -->
<button class="btn btn-outline-danger">Outline Danger</button>

<!-- Outline Warning -->
<button class="btn btn-outline-warning">Outline Warning</button>

<!-- Outline Info -->
<button class="btn btn-outline-info">Outline Info</button>

<!-- Outline Secondary -->
<button class="btn btn-outline-secondary">Outline Secondary</button>


<!-- ==========================================
     BUTTON SIZES
     ========================================== -->

<!-- Extra Small Button -->
<button class="btn btn-success btn-xs">Extra Small</button>

<!-- Small Button -->
<button class="btn btn-success btn-sm">Small Button</button>

<!-- Normal Button (Default) -->
<button class="btn btn-success">Normal Button</button>

<!-- Large Button -->
<button class="btn btn-success btn-lg">Large Button</button>


<!-- ==========================================
     BUTTONS WITH ICONS
     ========================================== -->

<!-- Icon on Left -->
<button class="btn btn-success">
    <i class="fa fa-download"></i> Download
</button>

<!-- Icon on Right -->
<button class="btn btn-primary">
    Upload <i class="fa fa-upload"></i>
</button>

<!-- Icon Only (Circle Button) -->
<button class="btn btn-danger btn-icon">
    <i class="fa fa-trash"></i>
</button>

<!-- Icon Only with Heart -->
<button class="btn btn-info btn-icon">
    <i class="fa fa-heart"></i>
</button>

<!-- Icon with Badge -->
<button class="btn btn-warning btn-with-badge">
    <i class="fa fa-bell"></i> Notifications
    <span class="btn-badge">5</span>
</button>


<!-- ==========================================
     SPECIAL BUTTON STYLES
     ========================================== -->

<!-- Pill Button -->
<button class="btn btn-success btn-pill">Pill Shaped</button>

<!-- Raised Button -->
<button class="btn btn-primary btn-raised">Raised Effect</button>

<!-- Flat Button -->
<button class="btn btn-secondary btn-flat">Flat Button</button>

<!-- Glass Morphism Button -->
<button class="btn btn-glass">Glass Effect</button>

<!-- Gradient Button -->
<button class="btn btn-gradient">Gradient Green</button>

<!-- Gradient Primary -->
<button class="btn btn-gradient-primary">Gradient Blue</button>


<!-- ==========================================
     BUTTON STATES
     ========================================== -->

<!-- Normal State -->
<button class="btn btn-success">Normal Button</button>

<!-- Active/Pressed State -->
<button class="btn btn-success active">Active Button</button>

<!-- Disabled State -->
<button class="btn btn-success" disabled>Disabled Button</button>

<!-- Loading State -->
<button class="btn btn-success btn-loading" id="loadingBtn">
    <span class="spinner-border spinner-border-sm me-2"></span>
    Loading...
</button>


<!-- ==========================================
     FULL WIDTH BUTTONS
     ========================================== -->

<!-- Block Button (Full Width) -->
<button class="btn btn-success btn-block">
    Full Width Button
</button>

<!-- Half Width Button -->
<button class="btn btn-success btn-half">Half Width</button>

<!-- Third Width Button -->
<button class="btn btn-success btn-third">Third Width</button>


<!-- ==========================================
     BUTTON GROUPS
     ========================================== -->

<!-- Horizontal Button Group -->
<div class="btn-group" role="group">
    <button class="btn btn-success">Left</button>
    <button class="btn btn-success">Center</button>
    <button class="btn btn-success">Right</button>
</div>

<!-- Vertical Button Group -->
<div class="btn-group-vertical" role="group">
    <button class="btn btn-outline-primary">Option 1</button>
    <button class="btn btn-outline-primary">Option 2</button>
    <button class="btn btn-outline-primary">Option 3</button>
</div>

<!-- Outline Button Group -->
<div class="btn-group" role="group">
    <button class="btn btn-outline-info">View</button>
    <button class="btn btn-outline-info">Edit</button>
    <button class="btn btn-outline-info">Delete</button>
</div>


<!-- ==========================================
     BUTTON WITH LABELS
     ========================================== -->

<!-- Button with Text Label -->
<button class="btn btn-success btn-label">
    <span><i class="fa fa-cog"></i></span>
    <span>Settings</span>
</button>

<!-- Button with Dropdown Similar Function -->
<div style="display: inline-block; position: relative;">
    <button class="btn btn-primary">
        <i class="fa fa-chevron-down"></i> Dropdown
    </button>
</div>


<!-- ==========================================
     FORM SUBMIT BUTTONS
     ========================================== -->

<!-- Submit Button in Form -->
<form>
    <input type="text" placeholder="Enter something" class="form-control mb-3">
    <button type="submit" class="btn btn-success">Submit</button>
    <button type="reset" class="btn btn-secondary ms-2">Reset</button>
    <button type="button" class="btn btn-danger ms-2" onclick="alert('Cancelled')">Cancel</button>
</form>


<!-- ==========================================
     BUTTONS WITH TOOLTIPS
     ========================================== -->

<!-- Button with Tooltip -->
<button class="btn btn-success" title="Click to save changes" data-bs-toggle="tooltip">
    <i class="fa fa-save"></i> Save
</button>

<!-- Button with Hover Title -->
<button class="btn btn-info" data-title="Delete this item">
    <i class="fa fa-trash"></i> Delete
</button>


<!-- ==========================================
     INTERACTIVE BUTTONS (JS Examples)
     ========================================== -->

<!-- Toggle Button -->
<button class="btn btn-warning" id="toggleBtn" onclick="toggleButton()">
    <i class="fa fa-toggle-off"></i> Toggle
</button>

<!-- Increment Badge Button -->
<button class="btn btn-danger btn-with-badge" id="badgeBtn" onclick="incrementBadge()">
    <i class="fa fa-plus"></i> Add
    <span class="btn-badge" id="badgeCount">0</span>
</button>

<!-- Async Operation Button -->
<button class="btn btn-primary" id="asyncBtn" onclick="simulateAsync()">
    <i class="fa fa-spinner"></i> Process
</button>

<!-- Disable/Enable Toggle Button -->
<button class="btn btn-success" id="toggleDisableBtn">
    <i class="fa fa-lock"></i> Toggle Disable
</button>
<button class="btn btn-primary" id="targetBtn" onclick="alert('Button clicked!')">
    Target Button
</button>


<!-- ==========================================
     BUTTON COMBINATIONS
     ========================================== -->

<!-- Action Button Set -->
<div style="margin: 20px 0;">
    <button class="btn btn-success me-2">
        <i class="fa fa-check"></i> Approve
    </button>
    <button class="btn btn-danger me-2">
        <i class="fa fa-times"></i> Reject
    </button>
    <button class="btn btn-warning">
        <i class="fa fa-clock"></i> Pending
    </button>
</div>

<!-- Navigation Button Set -->
<div style="margin: 20px 0;">
    <button class="btn btn-outline-primary me-2">
        <i class="fa fa-chevron-left"></i> Previous
    </button>
    <button class="btn btn-outline-primary me-2">
        <i class="fa fa-home"></i> Home
    </button>
    <button class="btn btn-outline-primary">
        Next <i class="fa fa-chevron-right"></i>
    </button>
</div>

<!-- Login/Register Button Set -->
<div style="margin: 20px 0;">
    <button class="btn btn-success btn-lg btn-block mb-2">
        <i class="fa fa-sign-in"></i> Login
    </button>
    <button class="btn btn-outline-primary btn-lg btn-block">
        <i class="fa fa-user-plus"></i> Register
    </button>
</div>


<!-- ==========================================
     CUSTOM STYLED BUTTONS
     ========================================== -->

<!-- Social Media Buttons -->
<div style="margin: 20px 0;">
    <button class="btn btn-primary me-2">
        <i class="fab fa-facebook-f"></i> Facebook
    </button>
    <button class="btn btn-info me-2">
        <i class="fab fa-twitter"></i> Twitter
    </button>
    <button class="btn btn-danger me-2">
        <i class="fab fa-google"></i> Google
    </button>
    <button class="btn btn-dark">
        <i class="fab fa-github"></i> GitHub
    </button>
</div>

<!-- E-commerce Buttons -->
<div style="margin: 20px 0;">
    <button class="btn btn-success me-2">
        <i class="fa fa-shopping-cart"></i> Add to Cart
    </button>
    <button class="btn btn-warning me-2">
        <i class="fa fa-heart"></i> Wishlist
    </button>
    <button class="btn btn-info">
        <i class="fa fa-share"></i> Share
    </button>
</div>

<!-- Admin Buttons -->
<div style="margin: 20px 0;">
    <button class="btn btn-info me-2">
        <i class="fa fa-pencil"></i> Edit
    </button>
    <button class="btn btn-warning me-2">
        <i class="fa fa-eye"></i> View
    </button>
    <button class="btn btn-danger">
        <i class="fa fa-trash"></i> Delete
    </button>
</div>
